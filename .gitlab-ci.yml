stages:
  - test
  - build
  - deploy

variables:
  GO_VERSION: "1.25.3"

# =====================
# STAGE 1: TESTS
# =====================
run-tests:
  stage: test
  image: golang:1.25.3-alpine
  script:
    # Narrow scope: `./...` walks postgres_data*/data_test*/logs/ owned
    # by docker (UID 70, mode 0700) on dev machines and fails with
    # "permission denied". The module only contains code under cmd/ and
    # internal/, so test those explicitly.
    - go vet ./cmd/... ./internal/...
    - go test -v ./cmd/... ./internal/...
    - go test -race -short ./cmd/... ./internal/...

# =====================
# STAGE 2: BUILD
# =====================
build-image:
  stage: build
  image: docker:27-cli
  services:
    - docker:27-dind
  script:
    - echo "🏗 Building Docker image..."
    - docker build -t massage-bot:latest .
    # Note: We aren't pushing to a registry yet (using local build on server),
    # but this stage validates the Dockerfile itself is buildable.

# =====================
# STAGE 3: DEPLOY (TEST & PROD)
# =====================
deploy-test:
  stage: deploy
  image: alpine:3.21
  environment:
    name: test
  before_script:
    - "which ssh-agent || ( apk add --update openssh )"
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -p 2222 $HOME_SERVER_IP >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - echo "🧪 Automatically deploying to TEST Environment..."
    - ssh -p 2222 kirill@$HOME_SERVER_IP "cd /opt/vera-bot-test && git fetch origin master && git reset --hard origin/master && bash scripts/deploy_test_server.sh"
  rules:
    - if: $CI_COMMIT_BRANCH == "master"

deploy-production:
  stage: deploy
  image: alpine:3.21
  environment:
    name: production
  needs: ["run-tests"] # Only allow prod if tests pass
  before_script:
    - "which ssh-agent || ( apk add --update openssh )"
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -p 2222 $HOME_SERVER_IP >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - echo "🚀 Manually deploying to PRODUCTION Environment..."
    - ssh -p 2222 kirill@$HOME_SERVER_IP "cd /opt/vera-bot && git fetch origin master && git reset --hard origin/master && bash scripts/deploy_home_server.sh"
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
      when: manual

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Поиск пациентов</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="/static/card.css">
    <script src="/static/app.js" defer></script>
</head>
<body class="search-page" onload="performSearch('')">
    <div id="app">
        <div class="header">
            <div class="subtitle">АДМИНИСТРИРОВАНИЕ</div>
            <h1 class="large-title">Пациенты</h1>
        </div>

        <div class="search-input-wrapper">
            <input type="text" id="searchInput" 
                class="search-input"
                placeholder="Имя или ID пациента..." 
                oninput="performSearch(this.value)" 
                inputmode="text" 
                lang="ru"
                spellcheck="true">
            <i class="ph-duotone ph-magnifying-glass" style="position: absolute; left: 16px; top: 18px; font-size: 22px; color: var(--accent);"></i>
        </div>

        <div id="searchResults">
            <!-- Results injected here -->
        </div>
    </div>

    <script>
        function performSearch(query) {
            fetch('/api/search?q=' + encodeURIComponent(query), {
                headers: { 'X-Telegram-Init-Data': window.Telegram.WebApp.initData }
            })
            .then(r => r.json())
            .then(results => {
                let html = '';
                if (results.length === 0) {
                    html = `
                        <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
                            <i class="ph-duotone ph-users-slash" style="font-size: 48px; opacity: 0.3;"></i>
                            <p style="margin-top: 12px;">Никого не нашли</p>
                        </div>
                    `;
                } else {
                    results.forEach(p => {
                        html += `
                            <div class="card" onclick="window.location.href='/?id=${p.telegram_id}&from_search=true&initData=' + encodeURIComponent(window.Telegram.WebApp.initData)">
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <div style="display: flex; align-items: center; gap: 16px;">
                                        <div style="width: 48px; height: 48px; background: rgba(74, 103, 74, 0.05); border-radius: 24px; display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--accent); font-size: 18px;">
                                            ${p.name.charAt(0).toUpperCase()}
                                        </div>
                                        <div>
                                            <div style="font-weight: 600; font-size: 17px;">${p.name}</div>
                                            <div class="subtitle" style="margin:0;">#${p.telegram_id}</div>
                                        </div>
                                    </div>
                                    <div style="text-align: right;">
                                        <div style="font-size: 12px; font-weight: 700; color: var(--accent);">${p.total_visits} ВИЗ.</div>
                                        <i class="ph-bold ph-caret-right" style="color: var(--separator); font-size: 14px;"></i>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }
                document.getElementById('searchResults').innerHTML = html;
            });
        }
    </script>
</body>
</html>
